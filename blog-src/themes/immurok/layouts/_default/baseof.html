<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "nav.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', function() {
      var links = document.querySelector('.nav-links');
      var open = links.classList.toggle('open');
      this.setAttribute('aria-expanded', open);
    });
  </script>
</body>
</html>
