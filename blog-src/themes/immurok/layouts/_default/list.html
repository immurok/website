{{ define "main" }}
<section class="blog-hero">
  <div class="container-sm">
    <h1 class="blog-hero-title">Blog</h1>
    <p class="blog-hero-subtitle">{{ .Site.Params.description }}</p>
  </div>
</section>

<section class="section">
  <div class="container-sm">
    <div class="post-list">
      {{ range .Pages }}
      <article class="post-card">
        <div class="post-meta">
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
          {{ with .Params.tags }}
          <div class="post-tags">
            {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
          </div>
          {{ end }}
        </div>
        <h2 class="post-card-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        {{ with .Description }}<p class="post-card-desc">{{ . }}</p>{{ end }}
        <a href="{{ .Permalink }}" class="post-read-more">Read more &rarr;</a>
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
